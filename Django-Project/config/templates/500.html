{% extends "base.html" %}

{% block title %}Server Error - Academic Intelligence System{% endblock %}

{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="text-center">
        <div class="mb-4">
            <i class="bi bi-exclamation-octagon-fill" style="font-size: 5rem; color: var(--danger);"></i>
        </div>
        <h1 class="display-1 fw-bold mb-3">500</h1>
        <h2 class="mb-3">Server Error</h2>
        <p class="lead text-muted mb-4">Something went wrong on our end. Please try again later or contact support.</p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="{% url 'core:dashboard' %}" class="btn btn-primary btn-lg">
                <i class="bi bi-house-fill"></i> Go to Dashboard
            </a>
            <a href="javascript:location.reload()" class="btn btn-outline-secondary btn-lg">
                <i class="bi bi-arrow-clockwise"></i> Refresh Page
            </a>
        </div>
    </div>
</div>
{% endblock %}
