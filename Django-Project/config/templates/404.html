{% extends "base.html" %}

{% block title %}Page Not Found - Academic Intelligence System{% endblock %}

{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="text-center">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle" style="font-size: 5rem; color: var(--warning);"></i>
        </div>
        <h1 class="display-1 fw-bold mb-3">404</h1>
        <h2 class="mb-3">Page Not Found</h2>
        <p class="lead text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="{% url 'core:dashboard' %}" class="btn btn-primary btn-lg">
                <i class="bi bi-house-fill"></i> Go to Dashboard
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg">
                <i class="bi bi-arrow-left"></i> Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
