version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: academic_system_db
    environment:
      POSTGRES_DB: academic_system
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: academic_system_web
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-your-secret-key-here-change-in-production}
      DATABASE_URL: "postgresql://admin:${DB_PASSWORD:-secure_password_change_me}@db:5432/academic_system"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,web"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput --clear &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 config.wsgi"
    restart: unless-stopped

volumes:
  postgres_data:
