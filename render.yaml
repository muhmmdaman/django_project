services:
  - type: web
    name: academic-system
    runtime: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      cd Django-Project/config &&
      python manage.py collectstatic --noinput --clear
    startCommand: >
      cd Django-Project/config &&
      gunicorn --bind 0.0.0.0:10000 --workers 4 config.wsgi
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13"
      - key: PIP_VERSION
        value: "24.0"
    healthCheckPath: /admin/login/
    autoDeploy: true

  - type: pserv
    name: academic-system-db
    plan: free
    runtime: postgres
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: academic_system
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true

databases:
  - name: academic_system
    databaseName: academic_system
    user: postgres
    plan: free

envVars:
  - key: DATABASE_URL
    fromDatabase:
      name: academic_system
      property: connectionString
  - key: ALLOWED_HOSTS
    value: academic-system.onrender.com
  - key: DJANGO_SECRET_KEY
    generateValue: true
    sync: false
